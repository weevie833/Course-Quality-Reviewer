# PII Benchmark Suite
# 30 tests: 10 Program Director, 10 Instructional Designer, 5 Assistant Dean, 5 Cross-cutting
#
# Criterion types:
#   structural — local regex check; check_present (regex), check_absent (regex), check_contains (literal)
#   semantic   — Claude Haiku judges response against rubric; scores 0.0 / 0.5 / 1.0
#
# Weights: structural default 1.0, semantic default 2.0 (harder to get right)
# Test score = weighted average of criteria × 100
# Pass ≥ 80, Partial ≥ 50, Fail < 50

tests:

  # ─────────────────────────────────────────────────────────────
  # PROGRAM DIRECTOR
  # ─────────────────────────────────────────────────────────────

  - id: PD-001
    name: "Find risk management assignments in PM-800"
    user_type: program_director
    entry_point: find
    programs: ["Project Management"]
    message: "What assignments in PM-800 address risk management?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response cites PM-800"
        check_contains: "PM-800"
      - type: semantic
        weight: 2.0
        description: "Names specific assignment titles from PM-800 with retrieval evidence"
        rubric: "The response should name specific assignment or discussion titles from PM-800. It must show evidence of actual retrieval — citing specific titles — not vague hedged descriptions like 'PM-800 likely covers risk.' No hedging language (might, may, likely)."

  - id: PD-002
    name: "Find courses on organizational change in Leadership"
    user_type: program_director
    entry_point: find
    programs: ["Leadership"]
    message: "Which courses in the Leadership program include content on organizational change?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response cites specific course IDs"
        check_present: "LD-\\d+|COMM-\\d+|MGMT-\\d+"
      - type: semantic
        weight: 2.0
        description: "Cites courses by ID and title with concrete descriptions of relevant content"
        rubric: "The response should cite specific courses by ID and title and describe what content about organizational change is present in each. It should not just list course names or guess; it should be grounded in actual course content retrieved."

  - id: PD-003
    name: "Compare PLOs across Leadership and Project Management"
    user_type: program_director
    entry_point: compare
    programs: ["Leadership", "Project Management"]
    message: "Compare the program learning outcomes for Leadership and Project Management. How do they differ in focus?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response references PLOs for both programs"
        check_present: "PLO|program learning outcome"
      - type: semantic
        weight: 2.0
        description: "Cites actual PLO text for both programs and identifies substantive differences"
        rubric: "The response should cite or paraphrase actual PLO text from both programs and identify substantive differences in focus — not just count PLOs or describe programs generically. The comparison should be grounded in the retrieved PLO content."

  - id: PD-004
    name: "Connect LD-850 capstone to Leadership PLOs"
    user_type: program_director
    entry_point: connect
    programs: ["Leadership"]
    message: "How does LD-850 connect to the Leadership program learning outcomes?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response mentions LD-850"
        check_contains: "LD-850"
      - type: structural
        weight: 1.0
        description: "Response references capstone or PLO connection"
        check_present: "capstone|program learning outcome|PLO"
      - type: semantic
        weight: 2.0
        description: "Correctly identifies LD-850 as PLO-assessed capstone and names which PLOs it addresses"
        rubric: "The response should correctly describe LD-850 as a capstone course assessed directly against PLOs (not CLOs). It should identify which specific PLOs are addressed. It should not treat LD-850 like a regular course with CLO-level assessment."

  - id: PD-005
    name: "Forbidden language: 'weakness' substitution for PLO coverage"
    user_type: program_director
    entry_point: strength
    programs: ["Leadership"]
    message: "What are the weaknesses in PLO coverage for the Leadership program?"
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response does not use 'weakness' or 'weaknesses'"
        check_absent: "\\bweakness\\b|\\bweaknesses\\b"
      - type: structural
        weight: 1.5
        description: "Response uses correct substitute language"
        check_present: "area.{0,15}improvement|limited coverage|underdeveloped|areas for improvement"
      - type: semantic
        weight: 1.5
        description: "Substitution is natural and does not comment on the user's word choice"
        rubric: "The response must not use 'weakness' or 'weaknesses' anywhere. It must substitute 'area for improvement', 'limited coverage', or 'underdeveloped' naturally. It must NOT comment on or correct the user's word choice. The analysis itself should be substantive."

  - id: PD-006
    name: "PMI competency framework coverage in Project Management"
    user_type: program_director
    entry_point: coverage
    programs: ["Project Management"]
    message: "How much of the PMI competency framework is covered in the Project Management curriculum?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response references PMI competencies"
        check_present: "PMI|competenc"
      - type: semantic
        weight: 2.0
        description: "Reports coverage in concrete terms — counts, courses, or categories"
        rubric: "The response should report coverage in concrete terms: how many competencies are covered, which courses carry competency links, or which categories are represented. It must not give only a vague qualitative summary. Definitive framing should be used since formal PM links exist."

  - id: PD-007
    name: "Where is PLO 2 assessed in the Project Management program"
    user_type: program_director
    entry_point: where_assessed
    programs: ["Project Management"]
    message: "Where is PLO 2 assessed in the Project Management program?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response references PLO 2"
        check_present: "PLO 2|PLO\\s*2|program learning outcome 2"
      - type: semantic
        weight: 2.0
        description: "Traces PLO 2 to specific CLOs and the courses where they appear"
        rubric: "The response should trace PLO 2 to the specific CLOs it connects to and identify the courses where those CLOs appear. It should cite actual CLO language (or close paraphrase) rather than just saying 'CLOs exist.' A response that only says 'PLO 2 maps to CLOs in these courses' without quoting or characterizing the CLO text scores 0.5. A response that quotes CLO text and names the specific courses scores 1.0."

  - id: PD-008
    name: "SHRM competency alignment status in Leadership-HRM"
    user_type: program_director
    entry_point: standards
    programs: ["Leadership-HRM"]
    message: "Does the Leadership-HRM program have SHRM competency alignment formally established?"
    history: []
    criteria:
      - type: structural
        weight: 1.5
        description: "Response uses exploratory/pending framing — not 'gap'"
        check_present: "exploratory|pending|director|not yet finalized|working to|in progress"
      - type: semantic
        weight: 2.0
        description: "Correctly explains SHRM mapping is exploratory/in-progress, not a missing integration"
        rubric: "The response must correctly explain that SHRM competency-to-assignment mapping has not been finalized — it is a deliberate work-in-progress driven by the program director's active use of the PII. It must NOT frame this as a system failure, missing integration, or 'gap'. It should use exploratory framing and explain the director is using the PII to inform these decisions."

  - id: PD-009
    name: "Language quality evaluation of PLO 1 in Leadership"
    user_type: program_director
    entry_point: language_quality
    programs: ["Leadership"]
    message: "Evaluate PLO 1 in the Leadership program for structural quality."
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response opens with the language analysis preamble"
        check_present: "This analysis evaluates the language"
      - type: structural
        weight: 1.5
        description: "Response does not use 'lacks'"
        check_absent: "\\blacks\\b"
      - type: semantic
        weight: 2.0
        description: "Evaluates PLO against four-element framework; uses 'needs' framing"
        rubric: "The response should evaluate PLO 1 against structural conventions for well-formed learning outcomes (observable action verb, subject matter content, condition, measurability/criteria). It must use 'needs' framing (e.g., 'the PLO needs a condition') not 'lacks' framing. Each feedback point should be separated, not a wall of text."

  - id: PD-010
    name: "Where are LD competencies formally assessed in Leadership"
    user_type: program_director
    entry_point: where_assessed
    programs: ["Leadership"]
    message: "Where are LD competencies formally assessed in the Leadership program?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response cites specific course IDs with LD prefix"
        check_present: "LD-\\d+"
      - type: semantic
        weight: 2.0
        description: "Names specific courses with LD competency links and describes assessment mechanism"
        rubric: "The response should name specific courses where LD competencies are formally assessed (courses with item_competency_links, such as LD-804, LD-820, LD-821, LD-823, LD-810, LD-850) and describe how competencies are assessed (via rubric criteria linked to assignments). It should be definitive since formal links exist."

  # ─────────────────────────────────────────────────────────────
  # INSTRUCTIONAL DESIGNER
  # ─────────────────────────────────────────────────────────────

  - id: ID-001
    name: "Find assignments with rubrics in LD-820"
    user_type: instructional_designer
    entry_point: find
    programs: ["Leadership"]
    message: "What assignments in LD-820 have associated rubrics?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response cites LD-820"
        check_contains: "LD-820"
      - type: semantic
        weight: 2.0
        description: "Names specific assignment titles in LD-820 with rubric confirmation"
        rubric: "The response should name specific assignment titles in LD-820 and confirm they have rubrics. It should not just say 'yes, assignments have rubrics' generically. Specific names are required as evidence of actual retrieval."

  - id: ID-002
    name: "Compare CLOs in PM-800 and PM-811 for thematic overlap"
    user_type: instructional_designer
    entry_point: compare
    programs: ["Project Management"]
    message: "Compare the CLOs in PM-800 and PM-811. What themes do they share and where do they diverge?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response references both PM-800 and PM-811"
        check_contains: "PM-800"
      - type: structural
        weight: 1.0
        description: "Response references PM-811"
        check_contains: "PM-811"
      - type: semantic
        weight: 2.0
        description: "Lists CLO text for both courses and identifies shared and divergent themes"
        rubric: "The response should list or paraphrase CLO text from both PM-800 and PM-811 and identify specific shared themes and differences. It must be grounded in actual CLO text, not generic course descriptions."

  - id: ID-003
    name: "Connect PM-800 content to Leadership CLOs"
    user_type: instructional_designer
    entry_point: connect
    programs: ["Leadership"]
    message: "What CLOs in the Leadership program are addressed in PM-800?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response mentions PM-800"
        check_contains: "PM-800"
      - type: semantic
        weight: 2.0
        description: "Connects PM-800 assignments or content to Leadership CLOs with language alignment"
        rubric: "The response should connect PM-800 content to specific Leadership CLOs, using language from both the assignment content and the CLO text to show the connection. It should not just assert that PM-800 'aligns with' CLOs without citing specific language from each."

  - id: ID-004
    name: "CLO count and assignment coverage in LD-804"
    user_type: instructional_designer
    entry_point: coverage
    programs: ["Leadership"]
    message: "How many CLOs does LD-804 have, and are all of them covered by assessable assignments?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response references LD-804"
        check_contains: "LD-804"
      - type: semantic
        weight: 2.0
        description: "Provides specific CLO count and maps CLOs to assessable assignments"
        rubric: "The response should give a specific CLO count for LD-804 and show which CLOs are covered by which assignments or discussions (not Pages, which are not directly assessed). Vague 'yes all CLOs are covered' answers without specifics do not meet this criterion."

  - id: ID-005
    name: "Where is written communication assessed in Leadership"
    user_type: instructional_designer
    entry_point: where_assessed
    programs: ["Leadership"]
    message: "Where is written communication assessed in the Leadership program?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response cites specific course IDs"
        check_present: "LD-\\d+"
      - type: semantic
        weight: 2.0
        description: "Identifies specific courses and assignments where written communication is explicitly assessed"
        rubric: "The response should identify specific courses and assignments where written communication is explicitly assessed — via rubric criteria language, CLO language, or assignment requirements that reference writing. Generic 'writing is important in all courses' responses do not meet this criterion."

  - id: ID-006
    name: "Language alignment: rubric criteria vs CLOs in LD-820"
    user_type: instructional_designer
    entry_point: language_alignment
    programs: ["Leadership"]
    message: "Evaluate whether the rubric criteria in LD-820 align with its CLOs."
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response opens with the language analysis preamble"
        check_present: "This analysis evaluates the language"
      - type: semantic
        weight: 2.0
        description: "Assesses alignment between specific rubric criterion language and specific CLO language"
        rubric: "The response should compare specific rubric criterion text from LD-820 against specific CLO text, identifying where language connects and where it diverges. It must be grounded in actual rubric and CLO text, not generic advice about alignment."

  - id: ID-007
    name: "Language quality evaluation of CLOs in LD-804"
    user_type: instructional_designer
    entry_point: language_quality
    programs: ["Leadership"]
    message: "Evaluate the CLO language in LD-804 for structural quality."
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response opens with the language analysis preamble"
        check_present: "This analysis evaluates the language"
      - type: structural
        weight: 1.5
        description: "Response does not use 'lacks'"
        check_absent: "\\blacks\\b"
      - type: semantic
        weight: 2.0
        description: "Applies four-element framework to each CLO; uses 'needs' framing; no wall of text"
        rubric: "The response should evaluate CLO language in LD-804 against structural conventions (observable action verb, subject matter, condition, measurability). Each CLO should be addressed individually. It must use 'needs' framing (not 'lacks'). Each feedback point should be visually separated — no wall-of-text paragraphs."

  - id: ID-008
    name: "Online discussion design quality in LD-820"
    user_type: instructional_designer
    entry_point: standards
    programs: ["Leadership"]
    message: "Does the discussion prompt design in LD-820 follow best practices for online asynchronous discussions?"
    history: []
    criteria:
      - type: semantic
        weight: 2.0
        description: "References structural elements of discussion prompt design against actual LD-820 content"
        rubric: "The response should evaluate LD-820 discussion prompts against specific structural elements of well-formed asynchronous discussion prompts (e.g., clarity of task, reference to readings, stated purpose, response expectations). It must be grounded in actual LD-820 discussion content, not generic advice."

  - id: ID-009
    name: "AI activity recommendation for LD-820"
    user_type: instructional_designer
    entry_point: find
    programs: ["Leadership"]
    message: "I want to add an AI-based activity to LD-820. What would work well?"
    history: []
    criteria:
      - type: semantic
        weight: 2.0
        description: "Co-orients before prescribing; names AIAS level; recommends ID collaboration"
        rubric: "The response must co-orient to confirm what the user is trying to achieve before prescribing specific activities. It should name a likely AIAS level (No AI / Minimal / Moderate / Substantial / Full AI) and recommend ID collaboration. It must NOT jump directly into a list of prescribed activities without first establishing intent. It may close with an offer to suggest specific ideas."

  - id: ID-010
    name: "Back-reference anchoring: rubric follow-up"
    user_type: instructional_designer
    entry_point: find
    programs: ["Leadership"]
    multi_turn: true
    turns:
      - "What assignments in LD-820 have rubrics?"
      - "Tell me about the rubric criteria for the first assignment you listed."
    criteria:
      - type: semantic
        weight: 2.0
        description: "Second response correctly identifies and describes the specific rubric without requesting clarification"
        rubric: "The second response must identify the specific assignment mentioned first in the prior response and describe its rubric criteria. It must NOT ask the user to clarify which assignment they meant. If back-reference anchoring is working, the system resolves 'the first assignment you listed' automatically from the conversation history."

  # ─────────────────────────────────────────────────────────────
  # ASSISTANT DEAN
  # ─────────────────────────────────────────────────────────────

  - id: AD-001
    name: "Competency framework coverage across all programs"
    user_type: assistant_dean
    entry_point: coverage
    programs: []
    message: "Which programs have the most complete competency framework coverage, and where are the areas for improvement?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response mentions Leadership-HRM or SHRM coverage status"
        check_present: "Leadership-HRM|SHRM|Leadership-ITM|ITM"
      - type: semantic
        weight: 2.0
        description: "Accurately describes coverage for all four programs with appropriate framing"
        rubric: "The response should accurately describe: Project Management has comprehensive PMI competency links (definitive); Leadership has LD competency links for LD courses (definitive); Leadership-HRM has SHRM competencies loaded but no item links yet — mapping is exploratory/pending director decision; Leadership-ITM has LD links for LD courses, ITM framework for CMPL courses not yet determined. It must use appropriate framing (exploratory, pending) for the HRM and ITM situations."

  - id: AD-002
    name: "PLO counts and structure across all programs"
    user_type: assistant_dean
    entry_point: compare
    programs: []
    message: "Summarize the program learning outcome structure across all four programs — how many PLOs does each have and what is the general thematic focus?"
    history: []
    criteria:
      - type: semantic
        weight: 2.0
        description: "Reports accurate PLO counts (Leadership=6, Leadership-HRM=6, Leadership-ITM=8, PM=9) and describes thematic focus"
        rubric: "The response should report the correct PLO count for each program: Leadership=6, Leadership-HRM=6, Leadership-ITM=8, Project Management=9. It should describe the thematic focus of each program's PLOs based on their actual text content, not just the program name."

  - id: AD-003
    name: "PLO-CLO-assignment alignment documentation across programs"
    user_type: assistant_dean
    entry_point: standards
    programs: []
    message: "How well documented is the alignment between PLOs, CLOs, and assignments across the four programs?"
    history: []
    criteria:
      - type: structural
        weight: 1.0
        description: "Response references PLO-CLO link count or capstone assessment"
        check_present: "828|plo.{0,5}clo|PLO.{0,5}CLO|capstone"
      - type: semantic
        weight: 2.0
        description: "Accurately describes alignment documentation status including 828 links and capstone structure"
        rubric: "The response should reference the existence of PLO-CLO links (828 links) and describe the capstone structure (PLOs assessed directly at capstone level). It should accurately represent the documentation status without over-promising or hedging inappropriately."

  - id: AD-004
    name: "Where PLOs are directly assessed across all programs"
    user_type: assistant_dean
    entry_point: where_assessed
    programs: []
    message: "Where in the curriculum are program learning outcomes directly assessed across the four programs?"
    history: []
    criteria:
      - type: structural
        weight: 1.5
        description: "Response mentions capstone courses as PLO assessment points"
        check_present: "capstone|LD-850|PM-850|CMPL-850"
      - type: semantic
        weight: 2.0
        description: "Correctly identifies PLO assessment at capstone level across programs"
        rubric: "The response should correctly identify that PLOs are assessed directly at the capstone course level (LD-850 for Leadership programs, PM-850 for Project Management, CMPL-850 for Leadership-ITM) and that CLOs bridge the connection throughout required courses. It should not treat every course as a PLO assessment point."

  - id: AD-005
    name: "PLO language consistency across programs"
    user_type: assistant_dean
    entry_point: language_alignment
    programs: []
    message: "Evaluate the PLO language across the four programs for consistency in the use of action verbs and measurability."
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response opens with the language analysis preamble"
        check_present: "This analysis evaluates the language"
      - type: semantic
        weight: 2.0
        description: "Analysis is grounded in actual PLO text; identifies patterns across programs"
        rubric: "The response should provide analysis grounded in actual PLO text from across the programs — not just generic advice about action verbs. It should identify patterns in verb usage and measurability, citing specific PLOs where relevant. Generic recommendations without PLO-specific grounding do not meet this criterion."

  # ─────────────────────────────────────────────────────────────
  # CROSS-CUTTING BEHAVIORAL
  # ─────────────────────────────────────────────────────────────

  - id: BX-001
    name: "Forbidden language: 'weak' substitution in response"
    user_type: program_director
    entry_point: strength
    programs: ["Leadership-HRM"]
    message: "What are the weaknesses in PLO coverage for Leadership-HRM?"
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response does not use 'weakness', 'weaknesses', or 'weak'"
        check_absent: "\\bweakness\\b|\\bweaknesses\\b|\\bweak\\b"
      - type: structural
        weight: 1.5
        description: "Response uses approved substitute language"
        check_present: "area.{0,15}improvement|limited coverage|underdeveloped|areas for improvement"
      - type: semantic
        weight: 1.5
        description: "Substitution is natural; no meta-comment on user's word choice"
        rubric: "The response must not use 'weakness', 'weaknesses', or 'weak' anywhere. It must substitute approved language naturally. It must NOT tell the user their word choice was wrong or comment on it in any way. The actual PLO coverage analysis should be substantive."

  - id: BX-002
    name: "Options rendered as blockquote format"
    user_type: program_director
    entry_point: find
    programs: ["Project Management"]
    message: "I want to explore the Project Management program. Where should I start?"
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response uses blockquote + bold option format"
        check_present: "> \\*\\*Option"
      - type: semantic
        weight: 2.0
        description: "Options are phrased as natural standalone user messages"
        rubric: "Any choices or options presented in the response must use the blockquote + bold format: '> **Option N:** [phrase]'. Each option phrase must read naturally as a standalone user message that the user could literally send. Options must NOT be presented as bullet points. The phrases should be meaningfully different entry points."

  - id: BX-003
    name: "Co-orientation formula for low-confidence query"
    user_type: program_director
    entry_point: compare
    programs: ["Leadership"]
    message: "How is alignment in the program?"
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response does not use prohibited co-orientation phrases"
        check_absent: "your question is unclear|could you be more specific|that.s a broad question"
      - type: structural
        weight: 1.5
        description: "Response uses the co-orientation formula"
        check_present: "I can approach|which is closer"
      - type: semantic
        weight: 2.0
        description: "Asks one question naming exactly two plausible interpretations"
        rubric: "The response should ask a single clarifying question that names two plausible interpretations of 'alignment' (e.g., PLO-CLO alignment vs. competency-to-assignment alignment vs. rubric-CLO alignment). It must use the formula: 'I can approach this as [X] or as [Y] — which is closer to what you need right now?' It must NOT say the query is unclear or ask the user to be more specific."

  - id: BX-004
    name: "Exploratory framing for Leadership-HRM SHRM competency query"
    user_type: instructional_designer
    entry_point: strength
    programs: ["Leadership-HRM"]
    message: "Which assignments in the Leadership-HRM program best align with SHRM leadership competencies?"
    history: []
    criteria:
      - type: structural
        weight: 2.0
        description: "Response does NOT use definitive framing"
        check_absent: "formally assessed|is assessed by|definitively assessed"
      - type: structural
        weight: 1.5
        description: "Response uses exploratory framing signal"
        check_present: "exploratory|starting point|director.{0,20}review|semantic alignment|based on language|no formal"
      - type: semantic
        weight: 2.0
        description: "Opens with exploratory basis framing; closes with director review note"
        rubric: "The response should open with a brief framing line that names the exploratory basis (e.g., 'Since SHRM competency-to-assignment links have not been formally established, this analysis is based on semantic alignment of assignment language with SHRM competency descriptions'). It should rank assignments by semantic strength and close with a note that results are a starting point for director review — not definitive assessments."

  - id: BX-005
    name: "Definitive framing for PM competency with formal links"
    user_type: instructional_designer
    entry_point: where_assessed
    programs: ["Project Management"]
    message: "What assignments formally assess PM-2.10.1?"
    history: []
    criteria:
      - type: structural
        weight: 1.5
        description: "Response cites the PM-2.10.1 competency code"
        check_contains: "PM-2.10.1"
      - type: structural
        weight: 2.0
        description: "Response does not hedge with 'might', 'could', 'potentially', or 'may align'"
        check_absent: "\\bmight\\b|\\bcould align\\b|\\bpotentially\\b|\\bmay align\\b"
      - type: semantic
        weight: 2.0
        description: "Uses present tense definitive statements; cites specific assignments with formal links"
        rubric: "The response should use definitively framed present-tense statements (e.g., 'PM-2.10.1 is assessed in...' not 'PM-2.10.1 might be covered by...'). Since PM competency-to-assignment links are formally established, all statements about what is assessed must be definitive, not hedged. It should cite specific assignment names."
